
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartstock-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: smartstock
      APP_PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartstock-network
    volumes:
      - ./src:/app/src
      - /app/node_modules

  postgres:
    image: postgres:16-alpine
    container_name: smartstock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartstock
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartstock-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  smartstock-network:
    driver: bridge

volumes:
  postgres_data: